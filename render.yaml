services:
  - type: web
    name: eckl-materialverwaltung
    runtime: node
    plan: free
    buildCommand: rm -f package-lock.json && npm install --omit=dev --no-audit --no-fund
    startCommand: node server.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: ECKL_APP_MODE
        value: render
      - key: DATABASE_URL
        sync: false
